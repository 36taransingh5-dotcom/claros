services:
  - type: web
    name: claros-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build --workspace=packages/api
    startCommand: npm run start --workspace=packages/api
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://claros-neon.vercel.app
      - key: MODEL_NAME
        value: google/gemini-2.5-pro
